<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Hologram Viewer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --c:#00e5ff;--cg:rgba(0,229,255,.25);--cd:rgba(0,229,255,.07);
  --m:#ff2d95;--bg:#050a14;--s:rgba(8,16,32,.92);--b:rgba(0,229,255,.12);--t:#b8d8e4;--td:rgba(184,216,228,.35);
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Rajdhani',sans-serif;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(var(--b) 1px,transparent 1px),linear-gradient(90deg,var(--b) 1px,transparent 1px);background-size:50px 50px;opacity:.25;pointer-events:none}
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(5,10,20,.97) 0%,rgba(5,10,20,.8) 85%,transparent);padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;align-items:center;transition:transform .4s cubic-bezier(.4,0,.2,1)}
#topbar.hide{transform:translateY(-110%)}
.brand{display:flex;align-items:center;gap:8px}
.brand-dot{width:10px;height:10px;background:var(--c);border-radius:50%;box-shadow:0 0 10px var(--cg);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.brand h1{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:5px;color:var(--c);text-transform:uppercase}
.row{display:flex;gap:6px;width:100%;max-width:480px}
.inp{flex:1;background:rgba(0,229,255,.04);border:1px solid var(--b);border-radius:8px;padding:10px 12px;color:var(--t);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:border .3s}
.inp:focus{border-color:var(--c)}.inp::placeholder{color:var(--td)}
.btn{background:rgba(0,229,255,.05);border:1px solid var(--b);border-radius:8px;padding:10px 14px;color:var(--c);font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .25s;white-space:nowrap;text-transform:uppercase}
.btn:active{background:rgba(0,229,255,.15);border-color:var(--c)}
.btn-f{position:relative;overflow:hidden}.btn-f input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.opts{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.chip{background:rgba(0,229,255,.04);border:1px solid var(--b);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--td);cursor:pointer;transition:all .25s;letter-spacing:1px}
.chip.on{border-color:var(--c);color:var(--c);background:var(--cd)}
.sw{width:22px;height:22px;border-radius:50%;border:1.5px solid transparent;cursor:pointer;padding:0;transition:all .2s;box-shadow:0 0 0 1px var(--b) inset}
.sw.on{border-color:#fff;transform:scale(1.15);box-shadow:0 0 8px currentColor}
.sw-o{background:rgba(0,229,255,.04)!important;color:var(--c);font-size:12px;display:flex;align-items:center;justify-content:center}
.rng{-webkit-appearance:none;width:70px;height:3px;background:var(--b);border-radius:2px;outline:none}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--c);border-radius:50%;box-shadow:0 0 6px var(--cg);cursor:pointer}
.lbl{font-size:10px;letter-spacing:1px;color:var(--td)}
#menuBtn{position:fixed;top:10px;right:10px;z-index:200;width:34px;height:34px;background:rgba(0,229,255,.06);border:1px solid var(--b);border-radius:50%;color:var(--c);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#bottomBar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;gap:8px;padding:12px 16px 20px;justify-content:center;background:linear-gradient(0deg,rgba(5,10,20,.95) 0%,rgba(5,10,20,.7) 80%,transparent)}
.bar-btn{flex:1;max-width:180px;padding:12px 10px;background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(255,45,149,.05));border:1px solid var(--b);border-radius:12px;color:var(--c);font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:2px;cursor:pointer;text-align:center;text-transform:uppercase;transition:all .3s}
.bar-btn:active{background:rgba(0,229,255,.15);border-color:var(--c);box-shadow:0 0 20px var(--cd)}
.bar-btn.on{border-color:var(--c);box-shadow:0 0 16px var(--cd)}
.bar-btn span{display:block;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:400;color:var(--td);margin-top:3px;letter-spacing:0}
#c{position:fixed;inset:0;z-index:1}
#cam{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;display:none}
#welcome{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none;transition:opacity .5s}
#welcome.hide{opacity:0}
.wdia{width:60px;height:60px;border:1.5px solid var(--b);transform:rotate(45deg);display:flex;align-items:center;justify-content:center;animation:wf 4s ease-in-out infinite}
.wdia-in{width:22px;height:22px;border:1px solid rgba(0,229,255,.25);animation:ws 8s linear infinite}
@keyframes wf{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(-8px)}}
@keyframes ws{to{transform:rotate(360deg)}}
.wtext{font-size:13px;letter-spacing:2px;color:var(--td);text-align:center;line-height:2;text-transform:uppercase}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(60px);z-index:300;background:var(--s);border:1px solid var(--b);border-radius:24px;padding:8px 20px;font-size:12px;font-weight:500;color:var(--c);backdrop-filter:blur(10px);opacity:0;transition:transform .35s,opacity .35s;pointer-events:none;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="welcome"><div class="wdia"><div class="wdia-in"></div></div><div class="wtext">GLB dosyanızı yükleyin<br>3D hologram deneyimi başlasın</div></div>
<div id="topbar">
  <div class="brand"><div class="brand-dot"></div><h1>AR Hologram</h1></div>
  <div class="row"><input class="inp" id="urlInp" placeholder="GLB dosya URL'si yapıştırın..."><button class="btn" id="urlBtn">Yükle</button></div>
  <div class="row" style="justify-content:center"><label class="btn btn-f" for="fileInp">📁 Dosya Seç</label><input type="file" id="fileInp" style="display:none"></div>
  <div class="opts">
    <span class="lbl">Hız</span><input class="rng" id="spdRng" type="range" min="0" max="150" value="40">
    <button class="chip on" id="playChip">▶ Oto</button>
    <button class="chip on" id="glowChip">Hologram</button>
    <button class="chip" id="wireChip">Wireframe</button>
    <button class="chip" id="shotChip">📷 Kaydet</button>
  </div>
  <div class="opts" id="colorRow">
    <span class="lbl">Renk</span>
    <button class="sw on" data-col="0x00e5ff" style="background:#00e5ff"></button>
    <button class="sw" data-col="0xff2d95" style="background:#ff2d95"></button>
    <button class="sw" data-col="0x7cff00" style="background:#7cff00"></button>
    <button class="sw" data-col="0xffaa00" style="background:#ffaa00"></button>
    <button class="sw" data-col="0xaa55ff" style="background:#aa55ff"></button>
    <button class="sw" data-col="0xffffff" style="background:#ffffff"></button>
    <button class="sw sw-o" data-col="original" title="Orijinal">⟲</button>
    <input type="color" id="colorPick" value="#00e5ff" style="width:28px;height:28px;border:1px solid var(--b);border-radius:6px;background:transparent;cursor:pointer;padding:0">
  </div>
</div>
<button id="menuBtn">☰</button>
<div id="bottomBar">
  <button class="bar-btn" id="arBtn">📱 Kamera AR<span>Yüzeye yerleştir</span></button>
  <button class="bar-btn" id="pyrBtn">◇ Piramit<span>4 yönlü hologram</span></button>
</div>
<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════════════ MINI GLB PARSER ════════════ */
function parseGLB(buffer){
  const dv=new DataView(buffer);
  let off=12;const total=dv.getUint32(8,true);let json=null,bin=null;
  while(off<total){
    const len=dv.getUint32(off,true),tp=dv.getUint32(off+4,true);
    if(tp===0x4E4F534A)json=JSON.parse(new TextDecoder().decode(new Uint8Array(buffer,off+8,len)));
    else if(tp===0x004E4942)bin=buffer.slice(off+8,off+8+len);
    off+=8+len;
  }
  if(!json)throw new Error('GLB parse fail');
  const acc=(i)=>{
    const a=json.accessors[i],bv=json.bufferViews[a.bufferView],o=(bv.byteOffset||0)+(a.byteOffset||0);
    const s={SCALAR:1,VEC2:2,VEC3:3,VEC4:4,MAT4:16}[a.type];
    const T={5120:Int8Array,5121:Uint8Array,5122:Int16Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array}[a.componentType];
    return new T(bin,o,a.count*s);
  };
  const grp=new THREE.Group(),ms=[];
  (json.materials||[]).forEach(m=>{
    const p={side:THREE.DoubleSide};
    if(m.pbrMetallicRoughness){const pb=m.pbrMetallicRoughness;if(pb.baseColorFactor){p.color=new THREE.Color(pb.baseColorFactor[0],pb.baseColorFactor[1],pb.baseColorFactor[2]);p.opacity=pb.baseColorFactor[3]??1;}if(pb.metallicFactor!=null)p.metalness=pb.metallicFactor;if(pb.roughnessFactor!=null)p.roughness=pb.roughnessFactor;}
    if(m.emissiveFactor)p.emissive=new THREE.Color(...m.emissiveFactor);
    if(m.alphaMode==='BLEND')p.transparent=true;
    ms.push(new THREE.MeshStandardMaterial(p));
  });
  if(!ms.length)ms.push(new THREE.MeshStandardMaterial({color:0x00e5ff,metalness:.4,roughness:.4,side:THREE.DoubleSide}));
  const nds=(json.nodes||[]).map(()=>new THREE.Group());
  (json.nodes||[]).forEach((n,i)=>{
    const o=nds[i];
    if(n.translation)o.position.set(...n.translation);
    if(n.rotation)o.quaternion.set(...n.rotation);
    if(n.scale)o.scale.set(...n.scale);
    if(n.matrix){const m4=new THREE.Matrix4();m4.fromArray(n.matrix);m4.decompose(o.position,o.quaternion,o.scale);}
    if(n.children)n.children.forEach(c=>o.add(nds[c]));
    if(n.mesh!=null)(json.meshes[n.mesh].primitives).forEach(pr=>{
      const g=new THREE.BufferGeometry();
      if(pr.attributes.POSITION!=null)g.setAttribute('position',new THREE.BufferAttribute(acc(pr.attributes.POSITION),3));
      if(pr.attributes.NORMAL!=null)g.setAttribute('normal',new THREE.BufferAttribute(acc(pr.attributes.NORMAL),3));
      if(pr.attributes.TEXCOORD_0!=null)g.setAttribute('uv',new THREE.BufferAttribute(acc(pr.attributes.TEXCOORD_0),2));
      if(pr.indices!=null)g.setIndex(new THREE.BufferAttribute(acc(pr.indices),1));
      g.computeBoundingSphere();if(!pr.attributes.NORMAL)g.computeVertexNormals();
      o.add(new THREE.Mesh(g,ms[pr.material??0]||ms[0]));
    });
  });
  const cs=new Set();(json.nodes||[]).forEach(n=>(n.children||[]).forEach(c=>cs.add(c)));
  const sc=(json.scenes||[{nodes:[0]}])[json.scene||0];
  (sc.nodes||[]).forEach(i=>grp.add(nds[i]));
  if(!grp.children.length)nds.forEach((o,i)=>{if(!cs.has(i))grp.add(o);});
  return grp;
}
/* ════════════ STATE ════════════ */
let model=null,rotA=0,tilt=0,rotS=.006,mode='normal',holoG=true,wireF=false,menuOn=true,camStr=null,mRad=1,playing=true,zoom=1,userCol=null;
let tL=null,tLY=null,drag=false,pinchD=null,twoRot=false,tCX=0,tCY=0;
/* ════════════ THREE SETUP ════════════ */
const cv=document.getElementById('c');
const R=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true,preserveDrawingBuffer:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));R.setClearColor(0x050a14,1);
const sc=new THREE.Scene();
sc.add(new THREE.AmbientLight(0x334455,.5));
sc.add(new THREE.HemisphereLight(0x00e5ff,0x1a0030,.5));
const d1=new THREE.DirectionalLight(0x00e5ff,1.2);d1.position.set(3,5,4);sc.add(d1);
const d2=new THREE.DirectionalLight(0xff2d95,.35);d2.position.set(-3,2,-3);sc.add(d2);
const d3=new THREE.DirectionalLight(0x5500ff,.4);d3.position.set(0,-3,-4);sc.add(d3);
const rn=new THREE.Mesh(new THREE.RingGeometry(.9,.93,64),new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:.12,side:THREE.DoubleSide}));
rn.rotation.x=-Math.PI/2;rn.position.y=-.01;sc.add(rn);
const rn2=new THREE.Mesh(new THREE.RingGeometry(1.3,1.33,64),rn.material.clone());rn2.rotation.x=-Math.PI/2;rn2.position.y=-.01;sc.add(rn2);
const camM=new THREE.PerspectiveCamera(40,1,.1,500);
const camP=Array.from({length:4},()=>new THREE.PerspectiveCamera(30,1,.1,500));
function rsz(){const w=innerWidth,h=innerHeight;R.setSize(w,h);camM.aspect=w/h;camM.updateProjectionMatrix();}
rsz();addEventListener('resize',rsz);
/* ════════════ TOAST ════════════ */
function toast(m,d=3200){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),d);}
/* ════════════ LOAD ════════════ */
function setMdl(buf){
  if(model){sc.remove(model);model.traverse(c=>{c.geometry&&c.geometry.dispose();c.material&&(Array.isArray(c.material)?c.material:[c.material]).forEach(m=>m.dispose());});model=null;}
  try{model=parseGLB(buf);}catch(e){toast('⚠ GLB hatası');console.error(e);return;}
  const box=new THREE.Box3().setFromObject(model),cen=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3());
  const s=2.2/Math.max(sz.x,sz.y,sz.z);model.scale.setScalar(s);model.position.sub(cen.multiplyScalar(s));
  model.position.y-=box.min.y*s;
  const nb=new THREE.Box3().setFromObject(model),nc=nb.getCenter(new THREE.Vector3());
  model.position.x-=nc.x;model.position.z-=nc.z;mRad=nb.getSize(new THREE.Vector3()).length()/2;
  applyMat();sc.add(model);document.getElementById('welcome').classList.add('hide');updCam();toast('Model yüklendi ✓');
}
function applyMat(){if(!model)return;model.traverse(c=>{if(!c.isMesh)return;if(!c.userData.origColor){c.userData.origColor=c.material.color?c.material.color.clone():new THREE.Color(0x00e5ff);}const base=userCol!==null?new THREE.Color(userCol):c.userData.origColor.clone();const wireC=userCol!==null?userCol:0x00e5ff;c.material=wireF?new THREE.MeshBasicMaterial({color:wireC,wireframe:true,transparent:true,opacity:.7}):new THREE.MeshStandardMaterial({color:base,metalness:.6,roughness:.25,emissive:holoG?base.clone().multiplyScalar(.15):new THREE.Color(0),transparent:true,opacity:.92,side:THREE.DoubleSide});});}
function updCam(){const d=mRad*4.2/zoom;camM.position.set(0,mRad*.7,d);camM.lookAt(0,mRad*.3,0);[0,Math.PI/2,Math.PI,-Math.PI/2].forEach((a,i)=>{camP[i].position.set(Math.sin(a)*d,d*.4,Math.cos(a)*d);camP[i].lookAt(0,mRad*.3,0);});}
document.getElementById('fileInp').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const nm=(f.name||'').toLowerCase();if(!nm.endsWith('.glb')&&!nm.endsWith('.gltf')){toast('⚠ Sadece .glb/.gltf dosyaları');return;}toast('Okunuyor...');const r=new FileReader();r.onload=()=>setMdl(r.result);r.onerror=()=>toast('⚠ Dosya okunamadı');r.readAsArrayBuffer(f);});
function ldURL(u){if(!u)return;toast('İndiriliyor...');fetch(u).then(r=>{if(!r.ok)throw 0;return r.arrayBuffer();}).then(setMdl).catch(()=>toast('⚠ URL yüklenemedi'));}
document.getElementById('urlBtn').addEventListener('click',()=>ldURL(document.getElementById('urlInp').value.trim()));
document.getElementById('urlInp').addEventListener('keydown',e=>{if(e.key==='Enter')ldURL(e.target.value.trim());});
/* ════════════ AR CAMERA ════════════ */
async function togAR(){
  const v=document.getElementById('cam');
  if(mode==='ar'){mode='normal';v.style.display='none';if(camStr){camStr.getTracks().forEach(t=>t.stop());camStr=null;}R.setClearColor(0x050a14,1);document.getElementById('arBtn').classList.remove('on');toast('AR kapatıldı');return;}
  try{camStr=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}});v.srcObject=camStr;v.style.display='block';mode='ar';R.setClearColor(0x000000,0);document.getElementById('arBtn').classList.add('on');document.getElementById('pyrBtn').classList.remove('on');toast('Kamerayı yüzeye doğrultun');}catch(e){toast('⚠ Kamera erişimi reddedildi');}
}
function togPyr(){
  if(mode==='pyramid'){mode='normal';document.getElementById('pyrBtn').classList.remove('on');toast('Normal mod');}
  else{if(mode==='ar'){document.getElementById('cam').style.display='none';if(camStr){camStr.getTracks().forEach(t=>t.stop());camStr=null;}R.setClearColor(0x050a14,1);document.getElementById('arBtn').classList.remove('on');}mode='pyramid';document.getElementById('pyrBtn').classList.add('on');toast('Piramidi ortaya yerleştirin');}
}
document.getElementById('arBtn').addEventListener('click',togAR);
document.getElementById('pyrBtn').addEventListener('click',togPyr);
/* ════════════ UI ════════════ */
document.getElementById('menuBtn').addEventListener('click',()=>{menuOn=!menuOn;document.getElementById('topbar').classList.toggle('hide',!menuOn);document.getElementById('menuBtn').textContent=menuOn?'✕':'☰';});
document.getElementById('spdRng').addEventListener('input',e=>{rotS=(e.target.value/100)*.015;});
document.getElementById('glowChip').addEventListener('click',function(){holoG=!holoG;this.classList.toggle('on',holoG);applyMat();});
document.getElementById('wireChip').addEventListener('click',function(){wireF=!wireF;this.classList.toggle('on',wireF);applyMat();});
/* play/pause */
document.getElementById('playChip').addEventListener('click',function(){playing=!playing;this.classList.toggle('on',playing);this.textContent=playing?'▶ Oto':'⏸ Oto';toast(playing?'Otomatik rotasyon açık':'Rotasyon durduruldu',1500);});
/* screenshot */
document.getElementById('shotChip').addEventListener('click',()=>{if(!model){toast('Önce model yükleyin');return;}try{const url=cv.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='hologram-'+Date.now()+'.png';document.body.appendChild(a);a.click();a.remove();toast('Ekran görüntüsü kaydedildi ✓');}catch(e){toast('⚠ Kayıt başarısız (CORS?)');}});
/* color swatches */
document.querySelectorAll('.sw').forEach(sw=>{sw.addEventListener('click',function(){document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));this.classList.add('on');const v=this.dataset.col;userCol=v==='original'?null:parseInt(v);applyMat();});});
document.getElementById('colorPick').addEventListener('input',e=>{document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));userCol=parseInt(e.target.value.replace('#','0x'));applyMat();});
/* pinch + rotate + tilt gestures */
function dist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}
cv.addEventListener('touchstart',e=>{if(mode==='pyramid')return;if(e.touches.length===1){tL=e.touches[0].clientX;tLY=e.touches[0].clientY;drag=true;pinchD=null;twoRot=false;}else if(e.touches.length===2){drag=false;pinchD=dist(e.touches[0],e.touches[1]);tCX=(e.touches[0].clientX+e.touches[1].clientX)/2;tCY=(e.touches[0].clientY+e.touches[1].clientY)/2;twoRot=true;}},{passive:true});
cv.addEventListener('touchmove',e=>{if(mode==='pyramid')return;if(e.touches.length===2&&pinchD!==null){const nd=dist(e.touches[0],e.touches[1]);zoom=Math.max(.3,Math.min(5,zoom*(nd/pinchD)));pinchD=nd;const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;if(model){rotA+=(cx-tCX)*.008;tilt=Math.max(-1.2,Math.min(1.2,tilt+(cy-tCY)*.008));}tCX=cx;tCY=cy;updCam();}else if(drag&&e.touches.length===1&&model){const x=e.touches[0].clientX,y=e.touches[0].clientY;rotA+=(x-tL)*.008;tilt=Math.max(-1.2,Math.min(1.2,tilt+(y-tLY)*.006));tL=x;tLY=y;}},{passive:true});
cv.addEventListener('touchend',e=>{if(e.touches.length===0){drag=false;pinchD=null;twoRot=false;}else if(e.touches.length===1){pinchD=null;twoRot=false;tL=e.touches[0].clientX;tLY=e.touches[0].clientY;drag=true;}});
cv.addEventListener('mousedown',e=>{if(mode==='pyramid')return;tL=e.clientX;tLY=e.clientY;drag=true;});
cv.addEventListener('mousemove',e=>{if(!drag||!model)return;rotA+=(e.clientX-tL)*.005;tilt=Math.max(-1.2,Math.min(1.2,tilt+(e.clientY-tLY)*.004));tL=e.clientX;tLY=e.clientY;});
cv.addEventListener('mouseup',()=>{drag=false;});
cv.addEventListener('wheel',e=>{if(mode==='pyramid')return;e.preventDefault();zoom=Math.max(.3,Math.min(5,zoom*(e.deltaY<0?1.1:.9)));updCam();},{passive:false});
/* ════════════ RENDER ════════════ */
function frame(){
  requestAnimationFrame(frame);
  if(model){if(playing)rotA+=rotS;model.rotation.y=rotA;model.rotation.x=tilt;}
  rn.rotation.y+=.0008;rn2.rotation.y-=.0005;
  const w=innerWidth,h=innerHeight;
  if(mode==='pyramid'&&model){
    R.setScissorTest(true);R.clear();
    const vs=Math.min(w,h)*.37,cx=w/2,cy=h/2,g=vs*.04;
    [{x:cx-vs/2,y:cy-vs-g,i:0},{x:cx+g,y:cy-vs/2,i:1},{x:cx-vs/2,y:cy+g,i:2},{x:cx-vs-g,y:cy-vs/2,i:3}].forEach(v=>{
      const gx=Math.floor(v.x),gy=Math.floor(h-v.y-vs);
      R.setViewport(gx,gy,Math.ceil(vs),Math.ceil(vs));R.setScissor(gx,gy,Math.ceil(vs),Math.ceil(vs));
      camP[v.i].aspect=1;camP[v.i].updateProjectionMatrix();R.render(sc,camP[v.i]);
    });R.setScissorTest(false);
  }else{camM.aspect=w/h;camM.updateProjectionMatrix();R.setViewport(0,0,w,h);R.render(sc,camM);}
}
frame();
toast('Hazır — GLB dosyanızı yükleyin',4000);
</script>
